version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: transit
      POSTGRES_PASSWORD: transit
      POSTGRES_DB: transit_hub
    ports:
      - "5432:5432"
    volumes:
      - transit_hub_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transit"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://transit:transit@db:5432/transit_hub
      CORS_ORIGINS: http://localhost:5173
      ENABLE_SCHEDULER: "true"
      INGEST_INTERVAL_SECONDS: "30"
    ports:
      - "8000:8000"

volumes:
  transit_hub_db:
